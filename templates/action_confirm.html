{% extends "layout.html" %}

{% block title %}Confirm Action | AI Arbitration{% endblock %}

{% block content %}
<div class="glass-card">
    <div class="card-header">
        <h1>Confirm Action</h1>
        <p>Case ID: {{ case.case_id }}</p>
    </div>
    
    <div style="background: rgba(255,255,255,0.05); padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem;">
        <p>You are about to <strong>{{ action_title }}</strong>.</p>
        <p>This action is irreversible.</p>
    </div>

    <form action="{{ post_url }}" method="POST">
        <input type="hidden" name="caseId" value="{{ case.case_id }}">
        <input type="hidden" name="token" value="{{ token }}">
        {% if actionType %}
        <input type="hidden" name="actionType" value="{{ actionType }}">
        {% endif %}
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Confirm</button>
    </form>
</div>
{% endblock %}
